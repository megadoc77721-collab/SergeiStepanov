<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сергей Степанов | Портфолио</title>
  <meta
    name="description"
    content="Премиальное dark-mode портфолио Сергея Степанова с динамической загрузкой изображений, видео и PDF из Google Drive."
  >
  <meta name="theme-color" content="#0b0b0b">
  <meta property="og:title" content="Сергей Степанов | Портфолио">
  <meta
    property="og:description"
    content="Кинематографичное портфолио Сергея Степанова: принты, баннеры, ивенты, соцсети, фото и меню."
  >
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="pageTop" aria-hidden="true"></div>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="page-orbs" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <header class="site-header" id="top">
    <nav class="nav shell" aria-label="Основная навигация">
      <a class="nav__brand" href="#pageTop">
        <span class="nav__brand-mark"></span>
        Сергей Степанов
      </a>
      <button class="nav__toggle" type="button" aria-expanded="false" aria-label="Открыть меню">
        <span></span>
        <span></span>
      </button>
      <div class="nav__links">
        <a href="#portfolio">Портфолио</a>
        <a href="#contact">Контакты</a>
        <a href="https://t.me/SYIBWR" target="_blank" rel="noreferrer">Telegram</a>
        <a href="https://vk.ru/syibwr" target="_blank" rel="noreferrer">VK</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero shell" id="hero">
      <div class="hero__content reveal">
        <div class="hero__intro">
          <h1>Сергей Степанов</h1>
          <p>Graphic designer / Merch &amp; Visual designer</p>
        </div>
      </div>

      <div class="hero__media reveal reveal--delay">
        <div class="hero__media-frame" id="heroMediaFrame">
          <div class="hero__video-wrap" id="heroVideoWrap" aria-hidden="true">
            <video class="hero__video" autoplay muted loop playsinline preload="auto">
              <source src="./assets/hero/hero.mp4" type="video/mp4">
            </video>
          </div>
          <img id="heroImage" src="" alt="Главная работа Сергея Степанова" loading="eager">
          <div class="hero__media-glow"></div>
        </div>
      </div>
    </section>

    <section class="section shell portfolio" id="portfolio">
      <div class="portfolio-intro reveal">
        <p class="portfolio-intro__eyebrow">Portfolio</p>
        <h2>Портфолио</h2>
      </div>

      <div class="portfolio-tabs glass-panel reveal" id="portfolioTabs" role="tablist" aria-label="Разделы портфолио"></div>
      <div class="portfolio-stage" id="portfolioStage" aria-live="polite"></div>
    </section>

    <section class="section shell contact" id="contact">
      <div class="portfolio-intro reveal">
        <p class="portfolio-intro__eyebrow">Contact</p>
        <h2>Контакты</h2>
      </div>

      <div class="contact-links reveal">
        <a class="contact-link glass-panel" href="https://t.me/SYIBWR" target="_blank" rel="noreferrer">Telegram</a>
        <a class="contact-link glass-panel" href="https://vk.ru/syibwr" target="_blank" rel="noreferrer">VK</a>
      </div>
    </section>
  </main>

  <footer class="site-footer shell">
    <div class="site-footer__panel glass-panel">
      <p>Сергей Степанов</p>
      <p>Graphic designer / Merch &amp; Visual designer</p>
    </div>
  </footer>

  <div class="project-modal" id="projectModal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Просмотр проекта">
    <div class="project-modal__backdrop" data-close-modal></div>
    <div class="project-modal__dialog glass-panel">
      <button class="project-modal__close" type="button" aria-label="Закрыть проект" data-close-modal>&times;</button>
      <div class="project-modal__media" id="modalMedia"></div>
    </div>
  </div>

  <template id="categoryPanelTemplate">
    <section class="category-panel"></section>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
